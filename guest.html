<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>婚宴桌位查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e; --gold-light: #e8d5a3; --gold-dark: #8b6914;
  --cream: #fdf8f0; --warm: #f5ede0; --deep: #1a1208; --brown: #3d2b0e;
  --text: #2c1f0a; --muted: #8a7055; --border: rgba(201,169,110,0.3);
  --success: #4a7c59; --success-bg: #e8f5ec; --danger: #8b2020;
  --veg: #3a7d44; --veg-bg: #e6f4ea;
  --child: #7c5c3a; --child-bg: #fdf0e6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: 'Noto Serif TC', serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ── HOME PAGE ── */
#homePage {
  background: linear-gradient(160deg, #1a1208 0%, #2e1e08 40%, #1a1208 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#homePage::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(201,169,110,0.08) 0%, transparent 70%);
}
.home-inner {
  position: relative; text-align: center;
  padding: 40px 24px; width: 100%; max-width: 460px;
}
.home-orn { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--gold); letter-spacing:0.3em; opacity:0.6; margin-bottom:10px; }
.home-title { font-family:'Cormorant Garamond',serif; font-size: clamp(2rem,8vw,3rem); color:var(--gold-light); font-weight:300; letter-spacing:0.12em; line-height:1.25; margin-bottom:8px; }
.home-sub { font-size:0.78rem; color:rgba(201,169,110,0.55); letter-spacing:0.28em; margin-bottom:40px; }
.home-divider { width:100px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 40px; }
.home-btns { display:flex; flex-direction:column; gap:14px; width:100%; max-width:280px; margin:0 auto; }
.btn-home {
  padding: 16px 28px; border:1px solid transparent;
  font-family:'Noto Serif TC',serif; font-size:0.95rem; cursor:pointer;
  letter-spacing:0.12em; transition:all 0.28s; border-radius:3px;
  text-decoration:none; display:block; text-align:center; width:100%;
}
.btn-home-primary { background:var(--gold); border-color:var(--gold); color:var(--deep); font-weight:500; }
.btn-home-primary:hover { background:var(--gold-light); transform:translateY(-2px); box-shadow:0 8px 24px rgba(201,169,110,0.25); }
.btn-home-secondary { background:transparent; border-color:rgba(201,169,110,0.38); color:rgba(201,169,110,0.75); }
.btn-home-secondary:hover { border-color:var(--gold); color:var(--gold); transform:translateY(-2px); }

/* ── SEARCH PAGE ── */
#searchPage { display:none; min-height:100vh; }
.guest-header {
  background:linear-gradient(135deg, var(--deep), var(--brown));
  padding: 28px 20px; text-align:center;
}
.guest-header h1 { font-family:'Cormorant Garamond',serif; font-size:1.7rem; color:var(--gold-light); font-weight:300; letter-spacing:0.2em; }
.guest-header p { font-size:0.78rem; color:rgba(201,169,110,0.55); letter-spacing:0.18em; margin-top:5px; }

.guest-body { max-width:500px; margin:0 auto; padding:32px 16px 60px; }

/* ── SEARCH BOX ── */
.search-box {
  background:white; border:1.5px solid var(--border); border-radius:6px;
  padding:22px 20px; margin-bottom:22px;
  box-shadow:0 4px 20px rgba(26,18,8,0.06);
}
.search-box label { display:block; font-size:0.82rem; color:var(--muted); letter-spacing:0.2em; margin-bottom:10px; }

/* Autocomplete wrapper */
.autocomplete-wrap { position:relative; }
.search-input-row { display:flex; gap:10px; }
.search-input {
  flex:1; min-width:0; padding:13px 15px;
  border:1.5px solid var(--border); border-radius:3px;
  font-family:'Noto Serif TC',serif; font-size:1rem; color:var(--text);
  background:var(--cream); outline:none; transition:border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.search-input:focus { border-color:var(--gold); }
.btn-search {
  padding:13px 20px; background:var(--gold); border:none; border-radius:3px;
  color:var(--deep); font-family:'Noto Serif TC',serif; font-size:0.9rem;
  font-weight:500; cursor:pointer; transition:all 0.2s;
  white-space:nowrap; letter-spacing:0.1em; flex-shrink:0;
  -webkit-tap-highlight-color: transparent;
}
.btn-search:hover { background:var(--gold-light); }
.btn-search:active { transform:scale(0.97); }

/* Dropdown suggestions */
.suggest-list {
  position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:white; border:1.5px solid var(--border); border-radius:3px;
  z-index:100; box-shadow:0 8px 24px rgba(26,18,8,0.12);
  max-height:220px; overflow-y:auto; display:none;
}
.suggest-list.open { display:block; }
.suggest-item {
  padding:11px 14px; cursor:pointer; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(201,169,110,0.08); transition:background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.suggest-item:last-child { border-bottom:none; }
.suggest-item:hover, .suggest-item.focused { background:var(--warm); }
.suggest-avatar { width:32px; height:32px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:0.85rem; color:var(--deep); font-weight:700; flex-shrink:0; }
.suggest-name { font-size:0.92rem; font-weight:500; }
.suggest-meta { font-size:0.72rem; color:var(--muted); margin-top:1px; }

/* ── RESULT CARD ── */
.result-card {
  background:white; border:1.5px solid var(--border); border-radius:6px;
  overflow:hidden; box-shadow:0 8px 32px rgba(26,18,8,0.1);
  animation:slideUp 0.3s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.result-header {
  background:linear-gradient(135deg, var(--deep), var(--brown));
  padding:20px 22px; display:flex; align-items:center; gap:14px;
}
.result-avatar {
  width:48px; height:48px; border-radius:50%; background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; color:var(--deep); font-weight:700; flex-shrink:0;
}
.result-name { font-size:1.15rem; color:var(--gold-light); }
.result-tag { font-size:0.72rem; color:rgba(201,169,110,0.5); letter-spacing:0.12em; margin-top:3px; }
.relation-badge {
  display:inline-block; margin-top:6px; padding:3px 10px;
  background:rgba(201,169,110,0.15); border:1px solid rgba(201,169,110,0.3);
  border-radius:20px; font-size:0.72rem; color:var(--gold-dark); letter-spacing:0.08em;
}

.result-body { padding:22px; }

.table-number { text-align:center; padding:18px 0; border-bottom:1px solid var(--border); margin-bottom:18px; }
.table-label { font-size:0.76rem; color:var(--muted); letter-spacing:0.28em; margin-bottom:6px; }
.table-num { font-family:'Cormorant Garamond',serif; font-size:4.2rem; font-weight:600; color:var(--gold); line-height:1; }
.table-name-display { font-size:0.88rem; color:var(--muted); margin-top:5px; }

.result-info { display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:12px; margin-bottom:18px; }
.info-item { text-align:center; padding:12px 8px; background:var(--warm); border-radius:3px; }
.info-lbl { font-size:0.68rem; color:var(--muted); letter-spacing:0.18em; margin-bottom:4px; }
.info-val { font-size:0.92rem; color:var(--text); font-weight:500; }

/* Special needs in result */
.special-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.special-tag { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:20px; font-size:0.8rem; }
.special-tag.veg { background:var(--veg-bg); color:var(--veg); border:1px solid rgba(58,125,68,0.2); }
.special-tag.child { background:var(--child-bg); color:var(--child); border:1px solid rgba(124,92,58,0.2); }

/* Checkin button */
.checkin-btn {
  width:100%; padding:15px; border:none; border-radius:3px;
  font-family:'Noto Serif TC',serif; font-size:1rem; cursor:pointer;
  transition:all 0.25s; letter-spacing:0.1em; display:block;
  -webkit-tap-highlight-color: transparent;
}
.checkin-btn.unchecked { background:var(--gold); color:var(--deep); font-weight:500; }
.checkin-btn.unchecked:hover { background:var(--gold-light); }
.checkin-btn.unchecked:active { transform:scale(0.98); }
.checkin-btn.checked { background:var(--success-bg); color:var(--success); border:1.5px solid #a8d5b0; cursor:default; pointer-events:none; }

/* Not found */
.not-found {
  text-align:center; padding:38px 18px; background:white;
  border:1.5px solid var(--border); border-radius:6px; animation:slideUp 0.3s ease;
}
.not-found .nf-icon { font-size:2.3rem; margin-bottom:10px; }
.not-found h3 { color:var(--brown); font-size:1.05rem; margin-bottom:6px; }
.not-found p { font-size:0.83rem; color:var(--muted); line-height:1.6; }

.back-btn {
  margin-top:22px; padding:10px 20px;
  background:transparent; border:1px solid var(--border);
  font-family:'Noto Serif TC',serif; font-size:0.83rem; color:var(--muted);
  cursor:pointer; border-radius:3px; letter-spacing:0.1em; transition:all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:hover { border-color:var(--gold); color:var(--gold); }

/* Toast */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--deep); color:var(--gold-light);
  padding:12px 22px; border-radius:4px; font-size:0.88rem;
  opacity:0; pointer-events:none; transition:all 0.3s; z-index:9999;
  white-space:nowrap; border:1px solid rgba(201,169,110,0.3);
  max-width:calc(100vw - 32px); text-align:center;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── MOBILE ── */
@media (max-width: 480px) {
  .home-title { font-size: clamp(1.9rem, 9vw, 2.6rem); }
  .home-inner { padding:36px 20px; }
  .guest-body { padding:24px 14px 60px; }
  .search-box { padding:18px 16px; }
  .result-body { padding:18px 16px; }
  .result-header { padding:16px 18px; gap:12px; }
  .result-info { grid-template-columns: repeat(2,1fr); }
  .table-num { font-size:3.6rem; }
  .suggest-list { position:fixed; left:14px; right:14px; top:auto; width:auto; }
}

/* SEAT MAP */
.seatmap-wrap { margin-top:20px; background:white; border:1px solid var(--border); border-radius:8px; padding:16px; }
.seatmap-title { font-size:0.82rem; color:var(--muted); letter-spacing:0.15em; text-align:center; margin-bottom:12px; }
.seatmap-layout { display:flex; gap:6px; align-items:stretch; }
.seatmap-grid-area { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
.seatmap-row { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; }
.seatmap-cell { background:var(--warm); border:1px solid var(--border); border-radius:5px; padding:6px 2px; text-align:center; font-size:0.78rem; color:var(--muted); min-height:30px; display:flex; align-items:center; justify-content:center; }
.seatmap-cell.highlighted { background:#fef08a; border:2px solid #ca8a04; color:#713f12; font-weight:700; font-size:0.85rem; animation:pulse-gold 1.5s infinite; }
.seatmap-cell.empty { background:transparent; border:1px dashed rgba(201,169,110,0.2); }
.seatmap-aisle { background:var(--warm); border:1px dashed var(--border); border-radius:5px; padding:5px; text-align:center; font-size:0.78rem; color:var(--muted); letter-spacing:0.15em; margin:2px 0; }
.seatmap-entrance { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; margin-top:2px; }
.seatmap-entrance-label { grid-column:3/5; background:#fee2e2; border:0.5px solid #fca5a5; border-radius:5px; padding:4px; text-align:center; font-size:0.72rem; font-weight:500; color:#991b1b; }
.seatmap-maintable-wrap { display:flex; flex-direction:column; flex-shrink:0; width:50px; }
.seatmap-maintable { width:46px; height:46px; background:#fdf2f8; border:2px solid #f0abfc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:500; color:#86198f; text-align:center; line-height:1.3; flex-shrink:0; }
.seatmap-maintable.highlighted { background:#fef08a; border:2px solid #ca8a04; color:#713f12; animation:pulse-gold 1.5s infinite; }
.seatmap-stage { width:28px; background:#fce7f3; border:1.5px solid #f9a8d4; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.seatmap-legend { display:flex; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
.seatmap-legend-item { display:flex; align-items:center; gap:4px; font-size:0.72rem; color:var(--muted); }
.seatmap-legend-dot { width:12px; height:12px; border-radius:3px; }
@keyframes pulse-gold { 0%,100%{box-shadow:0 0 0 0 rgba(202,138,4,0.4)} 50%{box-shadow:0 0 0 6px rgba(202,138,4,0)} }
@media(max-width:480px){
  .seatmap-cell { font-size:0.7rem; padding:4px 1px; min-height:26px; }
  .seatmap-maintable { width:38px; height:38px; font-size:0.65rem; }
  .seatmap-stage { width:22px; }
}
</style>
</head>
<body>

<!-- HOME PAGE -->
<div id="homePage">
  <div class="home-inner">
    <div class="home-orn">❦ ❦ ❦</div>
    <h1 class="home-title">婚宴桌位<br>查詢系統</h1>
    <p class="home-sub">WEDDING SEATING SYSTEM</p>
    <div class="home-divider"></div>
    <div class="home-btns">
      <button class="btn-home btn-home-primary" onclick="showSearch()">✦ 來賓查詢桌位</button>
      <a class="btn-home btn-home-secondary" href="admin.html">⚙ 主辦人後台管理</a>
    </div>
  </div>
</div>

<!-- SEARCH PAGE -->
<div id="searchPage">
  <div class="guest-header">
    <h1>✦ 來賓桌位查詢</h1>
    <p>請輸入您的姓名，查詢座位資訊</p>
  </div>
  <div class="guest-body">
    <div class="search-box">
      <label>來賓姓名</label>
      <div class="autocomplete-wrap">
        <div class="search-input-row">
          <input
            class="search-input" id="guestSearch"
            placeholder="請輸入您的姓名…"
            autocomplete="off"
            oninput="onSearchInput()"
            onkeydown="onSearchKeydown(event)"
            onfocus="onSearchInput()"
          />
          <button class="btn-search" onclick="searchGuest()">查詢</button>
        </div>
        <div class="suggest-list" id="suggestList"></div>
      </div>
    </div>
    <div id="guestResult"></div>
    <div style="text-align:center;margin-top:20px">
      <button class="back-btn" onclick="showHome()">← 返回首頁</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAp_ILpjSvOmLsMU9ONQa88XDLan6f4568",
  authDomain: "my-wedding-b2b97.firebaseapp.com",
  databaseURL: "https://my-wedding-b2b97-default-rtdb.firebaseio.com",
  projectId: "my-wedding-b2b97",
  storageBucket: "my-wedding-b2b97.firebasestorage.app",
  messagingSenderId: "237043710985",
  appId: "1:237043710985:web:875b8dfb1497357640ccd8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let localData = [];
let membersData = [];
let focusIndex = -1;

// Listen to tables data
onValue(ref(db, 'tables'), snapshot => {
  const raw = snapshot.val();
  localData = raw ? Object.values(raw).sort((a, b) => a.num - b.num) : [];
});

// Listen to members data (for unassigned seat lookup)
onValue(ref(db, 'members'), snapshot => {
  const raw = snapshot.val();
  membersData = raw ? Object.values(raw) : [];
});

// ─── PAGE NAVIGATION ───
window.showSearch = () => {
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('searchPage').style.display = 'block';
  document.getElementById('guestSearch').value = '';
  document.getElementById('guestResult').innerHTML = '';
  closeSuggest();
  setTimeout(() => document.getElementById('guestSearch').focus(), 100);
};

window.showHome = () => {
  document.getElementById('homePage').style.display = 'flex';
  document.getElementById('searchPage').style.display = 'none';
  closeSuggest();
};

// ─── AUTOCOMPLETE ───
function getAllGuests() {
  // From tables (assigned seats)
  const guests = [];
  const assignedNames = new Set();
  localData.forEach(t => {
    if (!t.guests) return;
    Object.entries(t.guests).forEach(([k, g]) => {
      guests.push({name: g.name, relation: g.relation, tid: t.id, gk: k, num: t.num, tname: t.name || '', assigned: true, checked: !!g.checked});
      assignedNames.add(g.name);
    });
  });
  // From members (unassigned)
  membersData.forEach(m => {
    if (!assignedNames.has(m.name)) {
      guests.push({name: m.name, relation: m.relation, assigned: false, checked: false});
    }
  });
  return guests;
}

window.onSearchInput = () => {
  const q = document.getElementById('guestSearch').value.trim();
  if (!q) { closeSuggest(); return; }

  const all = getAllGuests();

  // 1字：同姓氏全列出；多字：名字包含搜尋字串
  let combined;
  if (q.length === 1) {
    combined = all.filter(g => g.name[0] === q);
  } else {
    combined = all.filter(g => g.name.includes(q));
  }
  combined = combined.slice(0, 10);

  if (!combined.length) { closeSuggest(); return; }

  const list = document.getElementById('suggestList');
  focusIndex = -1;
  list.innerHTML = combined.map((g, i) => {
    // Escape single quotes in name for onclick
    const safeName = g.name.replace(/'/g, "\'");
    const isChecked = g.assigned && g.checked;
    const itemStyle = isChecked ? 'opacity:0.6;pointer-events:none;cursor:default;background:#f8f8f6;' : '';
    const checkedTag = isChecked
      ? `<span style="font-size:0.68rem;background:var(--success-bg);color:var(--success);padding:2px 8px;border-radius:10px;border:1px solid rgba(74,124,89,0.3);margin-left:4px">✓ 已報到</span>`
      : '';
    return `<div class="suggest-item" data-idx="${i}" style="${itemStyle}" ${isChecked ? '' : `onclick="selectSuggestion('${safeName}')"`}>
      <div class="suggest-avatar" style="${isChecked ? 'background:var(--success);' : ''}">${isChecked ? '✓' : g.name[0]}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="suggest-name">${highlightMatch(g.name, q)}</span>${checkedTag}
        </div>
        <div class="suggest-meta">${g.assigned
          ? `第 ${g.num} 桌${g.tname ? '・' + g.tname : ''}`
          : '<span style="color:#c0845a">⏳ 尚未安排座位</span>'}${g.relation ? '・' + g.relation : ''}</div>
      </div>
    </div>`;
  }).join('');
  list.classList.add('open');
};

function highlightMatch(name, q) {
  if (!q) return name;
  const idx = name.indexOf(q);
  if (idx < 0) return name;
  return name.slice(0, idx) + `<strong style="color:var(--gold-dark)">${name.slice(idx, idx + q.length)}</strong>` + name.slice(idx + q.length);
}

window.onSearchKeydown = (e) => {
  const list = document.getElementById('suggestList');
  const items = list.querySelectorAll('.suggest-item');
  if (!list.classList.contains('open') || !items.length) {
    if (e.key === 'Enter') searchGuest();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusIndex = Math.min(focusIndex + 1, items.length - 1);
    updateFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusIndex = Math.max(focusIndex - 1, -1);
    updateFocus(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (focusIndex >= 0 && items[focusIndex]) {
      const name = items[focusIndex].querySelector('.suggest-name').textContent;
      selectSuggestion(name);
    } else {
      searchGuest();
    }
  } else if (e.key === 'Escape') {
    closeSuggest();
  }
};

function updateFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === focusIndex));
  if (focusIndex >= 0 && items[focusIndex]) {
    items[focusIndex].scrollIntoView({block: 'nearest'});
  }
}

window.selectSuggestion = (name) => {
  document.getElementById('guestSearch').value = name;
  closeSuggest();
  searchGuest();
};

function closeSuggest() {
  const list = document.getElementById('suggestList');
  if (list) { list.classList.remove('open'); list.innerHTML = ''; }
  focusIndex = -1;
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrap')) closeSuggest();
});

// ─── SEARCH ───
window.searchGuest = () => {
  closeSuggest();
  const q = document.getElementById('guestSearch').value.trim();
  if (!q) return;

  let found = null, tInfo = null, foundKey = null;
  for (const t of localData) {
    if (!t.guests) continue;
    const entry = Object.entries(t.guests).find(([, g]) => g.name === q || g.name.includes(q) || q.includes(g.name));
    if (entry) { foundKey = entry[0]; found = entry[1]; tInfo = t; break; }
  }

  const el = document.getElementById('guestResult');

  // Not in tables → check members list
  if (!found) {
    const member = membersData.find(m => m.name === q || m.name.includes(q) || q.includes(m.name));
    if (member) {
      const relationHTML = member.relation ? `<div class="relation-badge">🎀 ${member.relation}</div>` : '';
      const vegBadge = member.veg > 0 ? '<span class="special-tag veg">🥗 素食餐點需求</span>' : '';
      const childBadge = member.chair > 0 ? '<span class="special-tag child">👶 兒童座椅需求</span>' : '';
      const specialHTML = (member.veg > 0 || member.chair > 0) ? `<div class="special-row">${vegBadge}${childBadge}</div>` : '';
      el.innerHTML = `<div class="result-card">
        <div class="result-header">
          <div class="result-avatar">${member.name[0]}</div>
          <div>
            <div class="result-name">${member.name} 您好</div>
            <div class="result-tag">歡迎蒞臨，恭喜新人</div>
            ${relationHTML}
          </div>
        </div>
        <div class="result-body">
          <div class="table-number">
            <div class="table-label" style="color:var(--gold-dark)">⏳ 座位安排中</div>
            <div style="font-size:1.1rem;color:var(--muted);margin:14px 0 6px;letter-spacing:0.05em">您的座位尚未完成安排</div>
            <div style="font-size:0.82rem;color:var(--muted)">請稍候或洽詢現場工作人員</div>
          </div>
          ${specialHTML}
          <div class="result-info">
            <div class="info-item"><div class="info-lbl">出席人數</div><div class="info-val">${member.attend || 1} 人</div></div>
            <div class="info-item"><div class="info-lbl">座位狀態</div><div class="info-val" style="color:var(--gold-dark)">待安排</div></div>
            ${member.relation ? `<div class="info-item"><div class="info-lbl">與新人關係</div><div class="info-val">${member.relation}</div></div>` : '<div class="info-item"></div>'}
          </div>
          <div style="background:var(--warm);border-radius:3px;padding:14px;text-align:center;font-size:0.85rem;color:var(--muted);border:1px dashed var(--border)">
            您已確認在賓客名單中，請稍候工作人員為您引導入座
          </div>
        </div>
      </div>`;
      return;
    }
    el.innerHTML = `<div class="not-found">
      <div class="nf-icon">🔍</div>
      <h3>找不到此來賓</h3>
      <p>查無「${q}」的資料，<br>請確認姓名是否正確，或洽詢工作人員。</p>
    </div>`;
    return;
  }

  // Look up attend count from members data
  const memberRecord = membersData.find(m => m.name === found.name);
  const attendCount = memberRecord ? (memberRecord.attend || 1) : 1;
  const relationHTML = found.relation ? `<div class="relation-badge">🎀 ${found.relation}</div>` : '';

  let specialHTML = '';
  if (found.veg || found.child) {
    specialHTML = `<div class="special-row">
      ${found.veg ? '<span class="special-tag veg">🥗 素食餐點已備妥</span>' : ''}
      ${found.child ? '<span class="special-tag child">👶 兒童座椅已準備</span>' : ''}
    </div>`;
  }

  el.innerHTML = `<div class="result-card">
    <div class="result-header">
      <div class="result-avatar">${found.name[0]}</div>
      <div>
        <div class="result-name">${found.name} 您好</div>
        <div class="result-tag">歡迎蒞臨，恭喜新人</div>
        ${relationHTML}
      </div>
    </div>
    <div class="result-body">
      <div class="table-number">
        <div class="table-label">您的座位桌號</div>
        <div class="table-num">${tInfo.num}</div>
        <div class="table-name-display">${tInfo.name || ''}</div>
      </div>
      ${specialHTML}
      <div class="result-info">
        <div class="info-item"><div class="info-lbl">出席人數</div><div class="info-val">${attendCount} 人</div></div>
        <div class="info-item"><div class="info-lbl">報到狀態</div><div class="info-val" id="gCkSt">${found.checked ? '✓ 已報到' : '尚未報到'}</div></div>
        ${found.relation
          ? `<div class="info-item"><div class="info-lbl">與新人關係</div><div class="info-val">${found.relation}</div></div>`
          : `<div class="info-item"><div class="info-lbl">桌位容量</div><div class="info-val">${tInfo.cap} 人</div></div>`}
      </div>
      <button
        class="checkin-btn ${found.checked ? 'checked' : 'unchecked'}"
        id="gCkBtn"
        data-tid="${tInfo.id}"
        data-gk="${foundKey}"
        ${found.checked ? 'disabled' : ''}
      >
        ${found.checked ? '✓ 已完成報到' : '點此完成報到'}
      </button>
    </div>
  </div>`;

  // Attach click handler via JS (not inline onclick) to ensure it works on all browsers
  // Show map if already checked in
  const existingMapEl = document.getElementById('checkin-seatmap');
  if (existingMapEl && found.checked) {
    loadSeatMap();
    setTimeout(() => { existingMapEl.innerHTML = renderSeatMap(tInfo.num); }, 300);
  }

  if (!found.checked) {
    document.getElementById('gCkBtn').addEventListener('click', async function() {
      const tid = this.dataset.tid;
      const gk = this.dataset.gk;
      this.disabled = true;
      this.textContent = '處理中…';
      try {
        await update(ref(db, `tables/${tid}/guests/${gk}`), { checked: true, checkedAt: Date.now() });
        this.className = 'checkin-btn checked';
        this.textContent = '✓ 已完成報到';
        const st = document.getElementById('gCkSt');
        if (st) st.textContent = '✓ 已報到';
        toast('✓ 報到成功！祝新人百年好合 💍');
        // Show seat map
        loadSeatMap();
        setTimeout(() => {
          const mapEl = document.getElementById('checkin-seatmap');
          if (mapEl) mapEl.innerHTML = renderSeatMap(tInfo.num);
        }, 300);
        // Telegram notification
        // Get attend count from membersData
        const memberRec = membersData.find(m => m.name === found.name);
        const attendCount = memberRec ? (memberRec.attend || 1) : 1;
        const vegCount   = memberRec ? (memberRec.veg   || 0) : (found.veg   ? 1 : 0);
        const childCount = memberRec ? (memberRec.chair || 0) : (found.child ? 1 : 0);
        notifyTelegram(found.name, found.relation, tInfo.num, tInfo.name, attendCount, vegCount, childCount);
      } catch (err) {
        this.disabled = false;
        this.textContent = '點此完成報到';
        toast('⚠ 網路異常，請再試一次');
      }
    });
  }
};

// ─── SEAT MAP ───
let seatMapData = {};

function loadSeatMap() {
  onValue(ref(db, 'seatmap'), snap => {
    seatMapData = snap.val() || {};
  }, { onlyOnce: true });
}

function renderSeatMap(highlightTableNum) {
  const ROWS = 6, COLS = 7;
  const EMPTY_CELLS = new Set(['5_0']); // bottom-left corner
  const hn = String(highlightTableNum);
  const mainVal = seatMapData['main'] || '';
  const isMainHighlighted = mainVal && String(mainVal) === hn;

  // Top rows (0-2)
  let topHTML = '';
  for (let r = 0; r < 3; r++) {
    topHTML += '<div class="seatmap-row" style="grid-template-columns:repeat(7,1fr)">';
    for (let c = 0; c < COLS; c++) {
      const key = `${r}_${c}`;
      const val = seatMapData[key] || '';
      const isHL = val && String(val) === hn;
      if (EMPTY_CELLS.has(key)) { topHTML += `<div class="seatmap-cell empty" style="background:transparent;border:none"></div>`; }
      else if (!val) { topHTML += `<div class="seatmap-cell empty"></div>`; }
      else {
        // Find table name from localData
        const tbl = localData.find(t => String(t.num) === String(val));
        const tname = tbl ? (tbl.name || '') : '';
        const label = tname ? `<div style="font-size:0.7em;opacity:0.75;line-height:1.2">${tname}</div>` : '';
        topHTML += `<div class="seatmap-cell${isHL ? ' highlighted' : ''}">${val}${label}</div>`;
      }
    }
    topHTML += '</div>';
  }

  // Bottom rows (3-5)
  let botHTML = '';
  for (let r = 3; r < ROWS; r++) {
    botHTML += '<div class="seatmap-row" style="grid-template-columns:repeat(7,1fr)">';
    for (let c = 0; c < COLS; c++) {
      const key = `${r}_${c}`;
      const val = seatMapData[key] || '';
      const isHL = val && String(val) === hn;
      if (EMPTY_CELLS.has(key)) { botHTML += `<div class="seatmap-cell empty" style="background:transparent;border:none"></div>`; }
      else if (!val) { botHTML += `<div class="seatmap-cell empty"></div>`; }
      else {
        const tbl = localData.find(t => String(t.num) === String(val));
        const tname = tbl ? (tbl.name || '') : '';
        const label = tname ? `<div style="font-size:0.7em;opacity:0.75;line-height:1.2">${tname}</div>` : '';
        botHTML += `<div class="seatmap-cell${isHL ? ' highlighted' : ''}">${val}${label}</div>`;
      }
    }
    botHTML += '</div>';
  }

  // Main table name
  const mainTbl = mainVal ? localData.find(t => String(t.num) === String(mainVal)) : null;
  const mainName = mainTbl ? (mainTbl.name || '') : '';

  return `<div class="seatmap-wrap">
    <div class="seatmap-title">📍 座位方向圖</div>
    <div class="seatmap-layout">
      <div class="seatmap-grid-area">
        ${topHTML}
        <div class="seatmap-aisle">走　道</div>
        ${botHTML}
        <div class="seatmap-entrance">
          <div class="seatmap-entrance-label" style="grid-column:4/6">↑ 出入口</div>
        </div>
      </div>
      <div class="seatmap-maintable-wrap">
        <div style="flex:3"></div>
        <div class="seatmap-maintable${isMainHighlighted ? ' highlighted' : ''}">
          ${mainVal ? mainVal : '主桌'}
          ${mainName ? `<div style="font-size:0.6rem;opacity:0.75;line-height:1.3">${mainName}</div>` : ''}
        </div>
        <div style="flex:3"></div>
      </div>
      <div class="seatmap-stage">
        <div style="writing-mode:vertical-rl;font-size:0.7rem;color:#9d174d;font-weight:500;letter-spacing:0.12em">舞　台</div>
      </div>
    </div>
    <div class="seatmap-legend">
      <div class="seatmap-legend-item"><div class="seatmap-legend-dot" style="background:#fef08a;border:1.5px solid #ca8a04"></div>你的桌位</div>
      <div class="seatmap-legend-item"><div class="seatmap-legend-dot" style="background:var(--warm);border:1px solid var(--border)"></div>其他桌位</div>
      <div class="seatmap-legend-item"><div class="seatmap-legend-dot" style="background:#fee2e2;border:0.5px solid #fca5a5"></div>出入口</div>
    </div>
  </div>`;
}

// ─── TELEGRAM NOTIFY ───
async function notifyTelegram(name, relation, tableNum, tableName, attendCount, vegCount, childCount) {
  const token = atob('ODU3OTM0NTk5NTpBQUhBTlpSRjhPRWJBSzlaWW9PVEZ2MEVmRG5JZnl2NGJqQQ==');
  const chat  = atob('NzIxNDM0OTAy');
  const attend = attendCount > 1 ? `${attendCount} 位` : '1 位';
  const specialNeeds = [];
  if (vegCount > 0)   specialNeeds.push(`🥗 素食 ${vegCount} 人`);
  if (childCount > 0) specialNeeds.push(`👶 嬰兒座椅 ${childCount} 張`);
  const msg = [
    `✅ <b>${name}</b> 完成報到`,
    `🪑 桌號：第 ${tableNum} 桌${tableName ? '・' + tableName : ''}`,
    relation ? `🎀 與新人關係：${relation}` : '',
    `👥 報到人數：${attend}`,
    specialNeeds.length > 0 ? `⚠️ 特殊需求：${specialNeeds.join('・')}` : ''
  ].filter(Boolean).join('\n');
  try {
    await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: chat, text: msg, parse_mode: 'HTML'})
    });
  } catch(e) { console.warn('Telegram notify failed', e); }
}

// ─── TOAST ───
let tt;
window.toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2800);
};
</script>
