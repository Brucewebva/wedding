<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空位查詢與現場加人</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e; --gold-light: #e8d5a3; --gold-dark: #8b6914;
  --cream: #fdf8f0; --warm: #f5ede0; --deep: #1a1208; --brown: #3d2b0e;
  --text: #2c1f0a; --muted: #8a7055; --border: rgba(201,169,110,0.3);
  --success: #4a7c59; --success-bg: #e8f5ec; --danger: #8b2020; --danger-bg: #fff0f0;
  --veg: #3a7d44; --veg-bg: #e6f4ea;
  --child: #7c5c3a; --child-bg: #fdf0e6;
  --info: #2c5f8a; --info-bg: #e8f0f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Serif TC', serif; background: #f0ebe3; color: var(--text); min-height: 100vh; }

#loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#1a1208,#2e1e08); }
.login-card { background:rgba(253,248,240,0.04); border:1px solid rgba(201,169,110,0.2); border-radius:4px; padding:48px 40px; width:100%; max-width:360px; text-align:center; }
.login-card h2 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:var(--gold-light); font-weight:300; margin-bottom:6px; }
.login-card p { font-size:0.8rem; color:rgba(201,169,110,0.5); letter-spacing:0.2em; margin-bottom:32px; }
.login-btn { width:100%; padding:13px; background:var(--gold); border:none; border-radius:2px; font-family:'Noto Serif TC',serif; font-size:1rem; font-weight:500; color:var(--deep); cursor:pointer; letter-spacing:0.1em; display:flex; align-items:center; justify-content:center; gap:10px; }
.login-btn:hover { background:var(--gold-light); }
.login-err { font-size:0.82rem; color:#e07070; margin-top:10px; min-height:20px; }
.form-group { margin-bottom:0; }
.form-input { padding:11px 14px; border:1.5px solid rgba(201,169,110,0.3); border-radius:3px; font-family:'Noto Serif TC',serif; font-size:0.95rem; color:var(--gold-light); background:rgba(253,248,240,0.06); outline:none; transition:border-color 0.2s; }
.form-input:focus { border-color:var(--gold); }
.form-input::placeholder { color:rgba(201,169,110,0.4); }
#loginLoading { color:rgba(201,169,110,0.5);font-size:0.85rem;margin-bottom:20px;min-height:24px;letter-spacing:0.1em; }

#mainPanel { display:none; }
.top-nav { background:var(--deep); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; border-bottom:1px solid rgba(201,169,110,0.2); }
.top-nav-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--gold); letter-spacing:0.1em; }
.top-nav-title::before { content:"🪑 "; }
.nav-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.nav-badge { font-size:0.72rem; background:rgba(201,169,110,0.12); color:var(--gold); padding:4px 10px; border-radius:20px; border:1px solid rgba(201,169,110,0.3); white-space:nowrap; }
.sync-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle; }
.sync-dot.ok { background:#4a7c59; }
.sync-dot.err { background:#c0392b; }
.sync-dot.loading { background:var(--gold); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.btn-sm { padding:8px 16px; font-family:'Noto Serif TC',serif; font-size:0.82rem; cursor:pointer; border-radius:3px; transition:all 0.2s; letter-spacing:0.05em; border:none; display:inline-flex; align-items:center; gap:5px; }
.btn-gold { background:var(--gold); color:var(--deep); font-weight:500; }
.btn-gold:hover { background:var(--gold-light); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); text-decoration:none; }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }

.container { max-width:1000px; margin:0 auto; padding:20px 16px 60px; }

.dashboard-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:18px; }
@media(max-width:700px){ .dashboard-grid { grid-template-columns:repeat(2,1fr); } }
.dash-card { background:white; border:1px solid var(--border); border-radius:6px; padding:14px 10px; text-align:center; }
.dash-icon { font-size:1.2rem; margin-bottom:4px; }
.dash-num { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; color:var(--gold-dark); line-height:1; }
.dash-lbl { font-size:0.72rem; color:var(--muted); letter-spacing:0.15em; margin-top:3px; }

.controls { background:white; border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:16px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
.controls label { display:flex; align-items:center; gap:6px; font-size:0.85rem; cursor:pointer; color:var(--text); }
.controls select { font-size:0.85rem; padding:6px 10px; border:1.5px solid var(--border); border-radius:3px; background:var(--cream); color:var(--text); font-family:'Noto Serif TC',serif; }
.search-box { flex:1; min-width:160px; }
.search-box input { width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:3px; font-size:0.86rem; background:var(--cream); color:var(--text); font-family:'Noto Serif TC',serif; }
.search-box input:focus { outline:none; border-color:var(--gold); }

.vlist { background:white; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.vrow { border-bottom:1px solid rgba(201,169,110,0.15); }
.vrow:last-child { border-bottom:none; }
.vrow-main { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; gap:12px; cursor:pointer; transition:background 0.15s; }
.vrow-main:hover { background:var(--warm); }
.vrow.expanded .vrow-main { background:var(--warm); }
.vleft { display:flex; align-items:center; gap:14px; min-width:0; flex:1; }
.vnum { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:700; color:var(--gold-dark); min-width:64px; flex-shrink:0; text-align:center; }
.vinfo { min-width:0; }
.vname { font-size:0.92rem; color:var(--text); font-weight:500; }
.vsub { font-size:0.76rem; color:var(--muted); margin-top:2px; }
.vbadge { font-size:0.8rem; font-weight:700; padding:6px 14px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.vbadge.empty { color:var(--success); background:var(--success-bg); }
.vbadge.full { color:var(--muted); background:rgba(0,0,0,0.05); }
.vbadge.over { color:var(--danger); background:var(--danger-bg); }
.vexpand-icon { color:var(--muted); font-size:0.8rem; transition:transform 0.2s; flex-shrink:0; }
.vrow.expanded .vexpand-icon { transform:rotate(90deg); }

.vrow-detail { display:none; padding:0 16px 16px; }
.vrow.expanded .vrow-detail { display:block; }
.vguest-list { margin-bottom:12px; }
.vguest-item { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; background:var(--warm); border-radius:3px; margin-bottom:5px; font-size:0.84rem; }
.vguest-tags { display:flex; gap:4px; align-items:center; }
.vtag { font-size:0.66rem; padding:1px 6px; border-radius:8px; }
.vtag.veg { background:var(--veg-bg); color:var(--veg); }
.vtag.child { background:var(--child-bg); color:var(--child); }
.vtag.checked { background:var(--success-bg); color:var(--success); }

.add-form { background:var(--cream); border:1.5px dashed var(--border); border-radius:5px; padding:14px; }
.add-form-title { font-size:0.78rem; color:var(--muted); letter-spacing:0.15em; margin-bottom:10px; }
.add-form-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.add-form-row input[type="text"] { flex:1; min-width:120px; padding:8px 12px; border:1.5px solid var(--border); border-radius:3px; font-family:'Noto Serif TC',serif; font-size:0.88rem; background:white; }
.add-form-row select { padding:8px 12px; border:1.5px solid var(--border); border-radius:3px; font-family:'Noto Serif TC',serif; font-size:0.88rem; background:white; }
.add-form-row input:focus, .add-form-row select:focus { outline:none; border-color:var(--gold); }
.add-form-checks { display:flex; gap:16px; margin-bottom:10px; flex-wrap:wrap; }
.add-form-checks label { display:flex; align-items:center; gap:6px; font-size:0.84rem; cursor:pointer; }
.add-form-note { font-size:0.74rem; color:var(--success); background:var(--success-bg); padding:7px 10px; border-radius:3px; margin-bottom:10px; }

.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.loading { text-align:center; padding:60px 20px; color:var(--muted); }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--deep); color:var(--gold-light); padding:11px 22px; border-radius:4px; font-size:0.88rem; opacity:0; pointer-events:none; transition:all 0.3s; z-index:9999; white-space:nowrap; border:1px solid rgba(201,169,110,0.3); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>空位查詢系統</h2>
    <p>VACANCY LOOKUP</p>
    <div class="form-group" style="text-align:left;margin-bottom:16px">
      <input type="password" id="pwInput" class="form-input" placeholder="請輸入密碼" style="width:100%;text-align:center;font-size:1.1rem;letter-spacing:0.2em" onkeydown="if(event.key==='Enter')doPasswordLogin()"/>
    </div>
    <button class="login-btn" onclick="doPasswordLogin()">登入</button>
    <div class="login-err" id="loginErr"></div>
    <div style="margin-top:18px;font-size:0.76rem;color:rgba(201,169,110,0.45);letter-spacing:0.08em;line-height:1.6">
      密碼提示：宴客日期（西元年+月日）
    </div>
    <div style="margin-top:16px">
      <a href="guest.html" style="font-size:0.82rem;color:rgba(201,169,110,0.4);letter-spacing:0.1em;text-decoration:none;">← 返回首頁</a>
    </div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="mainPanel">
  <div class="top-nav">
    <div class="top-nav-title">空位查詢與現場加人</div>
    <div class="nav-right">
      <span class="nav-badge" id="syncStatus"><span class="sync-dot loading"></span>連線中…</span>
      <a href="guest.html" class="btn-sm btn-outline">← 返回首頁</a>
      <a href="admin.html" class="btn-sm btn-outline">後台管理</a>
      <button class="btn-sm btn-outline" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="container">
    <div id="summary" class="dashboard-grid"></div>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜尋桌號或桌名…" oninput="renderVacancy()"/>
      </div>
      <label><input type="checkbox" id="only-empty" onchange="renderVacancy()"/> 只顯示有空位</label>
      <label>排序：
        <select id="sort-mode" onchange="renderVacancy()">
          <option value="num">依桌號</option>
          <option value="empty-desc">空位多→少</option>
          <option value="empty-asc">空位少→多</option>
        </select>
      </label>
    </div>

    <div id="vlist" class="loading">載入中…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAp_ILpjSvOmLsMU9ONQa88XDLan6f4568",
  authDomain: "my-wedding-b2b97.firebaseapp.com",
  databaseURL: "https://my-wedding-b2b97-default-rtdb.firebaseio.com",
  projectId: "my-wedding-b2b97",
  storageBucket: "my-wedding-b2b97.firebasestorage.app",
  messagingSenderId: "237043710985",
  appId: "1:237043710985:web:875b8dfb1497357640ccd8"
};

// 密碼以 SHA-256 雜湊比對，原始密碼不寫在程式碼中
const PASSWORD_HASH = "c145b18e5e831f6f4738937171a7e2fceacadce2b8df8a19fe6d8898739c35f6";

async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let tablesData = [];
let membersData = [];
let expandedTableId = null;

// Telegram 設定（與 guest.html 報到通知共用同一組 Bot）
async function sendTelegram(msg) {
  const token = atob('ODU3OTM0NTk5NTpBQUhBTlpSRjhPRWJBSzlaWW9PVEZ2MEVmRG5JZnl2NGJqQQ==');
  const chat  = atob('NzIxNDM0OTAy');
  console.log('[Telegram] sending:', msg);
  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: chat, text: msg, parse_mode: 'HTML'})
    });
    const data = await res.json();
    console.log('[Telegram] response:', data);
    if (!data.ok) {
      console.error('[Telegram] API error:', data.description);
      toast('⚠ Telegram 通知失敗：' + data.description);
    }
  } catch(e) {
    console.error('[Telegram] fetch failed', e);
    toast('⚠ Telegram 連線失敗');
  }
}

function getAttend(guestName, guestAttend) {
  if (guestAttend && guestAttend > 0) return guestAttend;
  const m = membersData.find(m => m.name === guestName);
  return m ? (m.attend || 1) : 1;
}

// ── AUTH (簡易密碼驗證) ──
function enterMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  startListeners();
}

window.doPasswordLogin = async () => {
  const pwEl = document.getElementById('pwInput');
  const errEl = document.getElementById('loginErr');
  const pw = pwEl.value.trim();
  if (!pw) { errEl.textContent = '請輸入密碼'; return; }
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    errEl.textContent = '';
    sessionStorage.setItem('vacancy_auth', 'ok');
    enterMain();
  } else {
    errEl.textContent = '密碼錯誤，請再試一次';
    pwEl.value = '';
    pwEl.focus();
  }
};

window.doLogout = () => {
  sessionStorage.removeItem('vacancy_auth');
  document.getElementById('mainPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
};

// 若本次瀏覽器分頁已驗證過，直接進入（關閉分頁或瀏覽器後需重新輸入）
if (sessionStorage.getItem('vacancy_auth') === 'ok') {
  enterMain();
}

// ── FIREBASE LISTENERS ──
function startListeners() {
  onValue(ref(db, 'tables'), snap => {
    const raw = snap.val();
    tablesData = raw ? Object.values(raw).filter(t => t && t.id) : [];
    document.getElementById('syncStatus').innerHTML = '<span class="sync-dot ok"></span>即時同步中';
    renderVacancy();
  }, () => { document.getElementById('syncStatus').innerHTML = '<span class="sync-dot err"></span>連線失敗'; });

  onValue(ref(db, 'members'), snap => {
    const raw = snap.val();
    membersData = raw ? Object.values(raw) : [];
    renderVacancy();
  });
}

// ── RENDER ──
window.renderVacancy = function() {
  const summaryEl = document.getElementById('summary');
  const listEl = document.getElementById('vlist');
  if (!summaryEl || !listEl) return;

  const onlyEmpty = document.getElementById('only-empty')?.checked;
  const sortMode = document.getElementById('sort-mode')?.value || 'num';
  const searchTerm = (document.getElementById('search-input')?.value || '').trim().toLowerCase();

  let rows = tablesData.map(t => {
    const gs = t.guests ? Object.entries(t.guests).filter(([,g]) => g && g.name) : [];
    let totalAttend = 0;
    gs.forEach(([,g]) => { totalAttend += getAttend(g.name, g.attend); });
    const cap = t.cap || 0;
    const empty = cap - totalAttend;
    return { t, gs, totalAttend, cap, empty };
  });

  const totalCap = rows.reduce((s,r) => s + r.cap, 0);
  const totalUsed = rows.reduce((s,r) => s + r.totalAttend, 0);
  const totalEmpty = rows.reduce((s,r) => s + Math.max(0, r.empty), 0);
  const tablesWithSpace = rows.filter(r => r.empty > 0).length;
  const fullTables = rows.filter(r => r.empty <= 0 && r.cap > 0).length;

  summaryEl.innerHTML = `
    <div class="dash-card"><div class="dash-icon">🍽️</div><div class="dash-num">${totalCap}</div><div class="dash-lbl">總容量</div></div>
    <div class="dash-card"><div class="dash-icon">👥</div><div class="dash-num">${totalUsed}</div><div class="dash-lbl">已安排人數</div></div>
    <div class="dash-card"><div class="dash-icon">🪑</div><div class="dash-num">${totalEmpty}</div><div class="dash-lbl">剩餘空位</div></div>
    <div class="dash-card"><div class="dash-icon">✓</div><div class="dash-num">${tablesWithSpace}</div><div class="dash-lbl">有空位桌數</div></div>
    <div class="dash-card"><div class="dash-icon">⏳</div><div class="dash-num">${fullTables}</div><div class="dash-lbl">已滿桌數</div></div>
  `;

  if (onlyEmpty) rows = rows.filter(r => r.empty > 0);
  if (searchTerm) {
    rows = rows.filter(r => {
      const numStr = r.t.num != null ? String(r.t.num) : '';
      const nameStr = (r.t.name || '').toLowerCase();
      return numStr.includes(searchTerm) || nameStr.includes(searchTerm);
    });
  }

  if (sortMode === 'empty-desc') rows.sort((a,b) => b.empty - a.empty);
  else if (sortMode === 'empty-asc') rows.sort((a,b) => a.empty - b.empty);
  else rows.sort((a,b) => (a.t.num ?? 9999) - (b.t.num ?? 9999));

  if (rows.length === 0) {
    listEl.innerHTML = `<div class="empty-state">沒有符合條件的桌位</div>`;
    listEl.className = '';
    return;
  }

  listEl.className = 'vlist';
  listEl.innerHTML = rows.map(r => {
    const t = r.t;
    const label = t.num != null ? `第 ${t.num} 桌` : '（無桌號）';
    let badgeClass = 'empty', badgeText = `空 ${r.empty} 位`;
    if (r.empty < 0) { badgeClass = 'over'; badgeText = `超額 ${-r.empty} 人`; }
    else if (r.empty === 0) { badgeClass = 'full'; badgeText = '已滿'; }
    const isExpanded = expandedTableId === t.id;

    const guestListHTML = r.gs.length
      ? r.gs.map(([k, g]) => {
          const attend = getAttend(g.name, g.attend);
          const tags = [
            attend > 1 ? `<span class="vtag" style="background:var(--info-bg);color:var(--info)">👫${attend}人</span>` : '',
            g.veg ? '<span class="vtag veg">🥗素食</span>' : '',
            g.child ? '<span class="vtag child">👶兒童</span>' : '',
            g.checked ? '<span class="vtag checked">✓已報到</span>' : '',
            g.walkIn ? '<span class="vtag" style="background:#fef3c7;color:#92400e">⚡臨時加入</span>' : ''
          ].filter(Boolean).join('');
          return `<div class="vguest-item"><span>${g.name}${g.relation ? ` <span style="color:var(--muted);font-size:0.76rem">（${g.relation}）</span>` : ''}</span><div class="vguest-tags">${tags}</div></div>`;
        }).join('')
      : `<div style="font-size:0.82rem;color:var(--muted);padding:6px 0">此桌尚無來賓</div>`;

    const canAdd = r.empty > 0;

    return `<div class="vrow ${isExpanded ? 'expanded' : ''}" data-tid="${t.id}">
      <div class="vrow-main" onclick="toggleExpand('${t.id}')">
        <div class="vleft">
          <div class="vnum">${label}</div>
          <div class="vinfo">
            <div class="vname">${t.name || '未命名'}</div>
            <div class="vsub">已安排 ${r.totalAttend} 人 / 容量 ${r.cap} 人</div>
          </div>
        </div>
        <span class="vbadge ${badgeClass}">${badgeText}</span>
        <span class="vexpand-icon">▶</span>
      </div>
      <div class="vrow-detail">
        <div class="vguest-list">${guestListHTML}</div>
        ${canAdd ? `
        <div class="add-form">
          <div class="add-form-title">＋ 現場加人到此桌（空位 ${r.empty} 位）</div>
          <div class="add-form-row">
            <input type="text" id="vadd-name-${t.id}" placeholder="來賓姓名"/>
            <select id="vadd-relation-${t.id}">
              <option value="">— 關係 —</option>
              <option>新郎父親朋友</option><option>新郎母親朋友</option><option>新郎親友</option>
              <option>新郎同事</option><option>新郎同學</option>
              <option>新娘同事</option><option>新娘同學</option><option>新娘親友</option>
            </select>
            <select id="vadd-attend-${t.id}" style="width:90px">
              ${Array.from({length: Math.max(1,r.empty)}, (_, i) => i+1).map(n => `<option value="${n}">出席 ${n} 人</option>`).join('')}
            </select>
          </div>
          <div class="add-form-checks">
            <label><input type="checkbox" id="vadd-veg-${t.id}"/> 🥗 素食需求</label>
            <label><input type="checkbox" id="vadd-child-${t.id}"/> 👶 兒童座椅</label>
          </div>
          <div class="add-form-note">✓ 此來賓將直接標記為「已報到」（現場加入視為已到場）</div>
          <button class="btn-sm btn-gold" onclick="addWalkIn('${t.id}')">確認加入並報到</button>
        </div>` : `<div style="font-size:0.82rem;color:var(--muted);padding:10px 0;text-align:center">此桌已無空位</div>`}
      </div>
    </div>`;
  }).join('');
};

window.toggleExpand = function(tid) {
  expandedTableId = expandedTableId === tid ? null : tid;
  renderVacancy();
};

window.addWalkIn = async function(tid) {
  const nameEl = document.getElementById(`vadd-name-${tid}`);
  const relEl = document.getElementById(`vadd-relation-${tid}`);
  const attendEl = document.getElementById(`vadd-attend-${tid}`);
  const vegEl = document.getElementById(`vadd-veg-${tid}`);
  const childEl = document.getElementById(`vadd-child-${tid}`);

  const name = nameEl.value.trim();
  if (!name) { toast('請輸入來賓姓名'); nameEl.focus(); return; }

  const t = tablesData.find(t => t.id === tid);
  if (!t) return;

  if (t.guests && Object.values(t.guests).find(g => g && g.name === name)) {
    toast('此桌已有同名來賓');
    return;
  }

  const relation = relEl.value;
  const attend = parseInt(attendEl.value) || 1;
  const veg = vegEl.checked;
  const child = childEl.checked;

  const key = 'g' + Date.now() + Math.random().toString(36).slice(2, 6);
  await set(ref(db, `tables/${tid}/guests/${key}`), {
    name, relation, attend, veg, child,
    checked: true,
    checkedAt: Date.now(),
    walkIn: true
  });

  // 同步新增到人員管理（members 節點）
  const existingMember = membersData.find(m => m.name === name);
  if (!existingMember) {
    const mid = 'm' + Date.now() + Math.random().toString(36).slice(2,5);
    await set(ref(db, 'members/' + mid), {
      id: mid, name, relation,
      attend, chair: child ? attend : 0, veg: veg ? attend : 0
    });
  }

  toast(`✓ 已加入：${name}（第 ${t.num != null ? t.num : ''} 桌，出席 ${attend} 人，已報到）`);

  // 發送 Telegram 通知
  const tableLabel = t.num != null ? `第 ${t.num} 桌` : (t.name || '主桌');
  const specialNeeds = [];
  if (veg) specialNeeds.push(`🥗 素食 ${attend} 人`);
  if (child) specialNeeds.push(`👶 嬰兒座椅 ${attend} 張`);
  const tgMsg = [
    `⚡ <b>${name}</b> 現場臨時加人（已報到）`,
    `🪑 桌號：${tableLabel}${t.name ? '・' + t.name : ''}`,
    relation ? `🎀 與新人關係：${relation}` : '',
    `👥 報到人數：${attend} 位`,
    specialNeeds.length > 0 ? `⚠️ 特殊需求：${specialNeeds.join('・')}` : ''
  ].filter(Boolean).join('\n');
  await sendTelegram(tgMsg);

  // Clear form
  nameEl.value = ''; relEl.value = ''; vegEl.checked = false; childEl.checked = false;
};

window.toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => el.classList.remove('show'), 2800);
};
</script>
</body>
</html>
